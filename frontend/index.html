<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NISAR Data Analysis</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- external stylesheet -->
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

    <!-- Navbar -->
    <nav class="navbar">
        <!-- Sidebar removed -->
        <div class="nav-brand">
            <span>NISAR Data Analysis</span>
        </div>
        <div class="nav-links">
            <!-- <a href="#" class="active">Dashboard</a>
            <a href="#">Observations</a>
            <a href="#">Settings</a> -->
        </div>
        <div class="nav-profile" style="display: flex; align-items: center; gap: 16px;">
            <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">
                <div class="toggle-icons">
                    <svg viewBox="0 0 24 24" class="sun-icon" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18">
                        <circle cx="12" cy="12" r="5"></circle>
                        <line x1="12" y1="1" x2="12" y2="3"></line>
                        <line x1="12" y1="21" x2="12" y2="23"></line>
                        <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
                        <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
                        <line x1="1" y1="12" x2="3" y2="12"></line>
                        <line x1="21" y1="12" x2="23" y2="12"></line>
                        <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
                        <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
                    </svg>
                    <svg viewBox="0 0 24 24" class="moon-icon" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18">
                        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
                    </svg>
                </div>
                <span id="themeStatusText">Dark Ops</span>
            </button>
            <!-- <div class="avatar">O</div> -->
        </div>
    </nav>
    <!-- Main Content -->
    <main class="main-content">

        <div class="dashboard-grid">
            <initial-table></initial-table>
            <time-based-initial-table></time-based-initial-table>
        </div>

        <analytics-dashboard data-launch-date="2026-01-01"></analytics-dashboard>

        <observations-app></observations-app>

    </main>

    <!-- Footer -->
    <footer class="footer">
        <div class="footer-content">
            <p>&copy; 2026 NISAR Data Analysis. All rights reserved.</p>
            <div class="footer-links">
                <a href="#">Privacy</a>
                <a href="#">Terms</a>
                <a href="#">Support</a>
            </div>
        </div>
    </footer>

    <!-- AI Chat Interface -->
    <div class="chat-widget" id="chatWidget">
        <div class="chat-header" id="chatHeader">
            <div class="chat-title">
                <span class="online-indicator"></span>
                AI Assistant
            </div>
            <button class="close-chat" id="closeChat">&times;</button>
        </div>
        <div class="chat-body" id="chatBody">
            <div class="message ai">
                Hi there! I'm your AI assistant. How can I help you with your observations today?
            </div>
        </div>
        <div class="chat-footer">
            <div class="chat-input-wrapper">
                <input type="text" id="chatInput" placeholder="Ask me anything...">
            </div>
            <button id="sendChat" class="send-btn">
                <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2">
                    <line x1="22" y1="2" x2="11" y2="13"></line>
                    <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                </svg>
            </button>
        </div>
    </div>

    <!-- Chat Toggle Button -->
    <button class="chat-toggle" id="chatToggle">
        <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
        </svg>
    </button>

    <!-- Chat Logic -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const chatWidget = document.getElementById('chatWidget');
            const chatToggle = document.getElementById('chatToggle');
            const closeChat = document.getElementById('closeChat');
            const chatInput = document.getElementById('chatInput');
            const sendChat = document.getElementById('sendChat');
            const chatBody = document.getElementById('chatBody');

            // Theme Toggle Logic
            const themeToggle = document.getElementById('themeToggle');
            const themeStatusText = document.getElementById('themeStatusText');
            const body = document.body;
            
            // Function to update text
            const updateThemeText = (isLight) => {
                themeStatusText.textContent = isLight ? 'Light Lab' : 'Dark Ops';
            };

            // check saved preference
            if (localStorage.getItem('theme') === 'light') {
                body.classList.add('light-mode');
                updateThemeText(true);
            } else {
                updateThemeText(false);
            }

            themeToggle.addEventListener('click', () => {
                body.classList.toggle('light-mode');
                
                const isLight = body.classList.contains('light-mode');
                updateThemeText(isLight);
                
                if (isLight) {
                    localStorage.setItem('theme', 'light');
                } else {
                    localStorage.setItem('theme', 'dark');
                }
            });

            // Open chat
            chatToggle.addEventListener('click', () => {
                chatWidget.classList.add('active');
                chatToggle.style.transform = 'scale(0)';
            });

            // Close chat
            closeChat.addEventListener('click', () => {
                chatWidget.classList.remove('active');
                setTimeout(() => {
                    chatToggle.style.transform = 'scale(1)';
                }, 300);
            });

            // Send message
            const sendMessage = () => {
                const text = chatInput.value.trim();
                if (!text) return;

                // Add user message
                const userMsg = document.createElement('div');
                userMsg.className = 'message user';
                userMsg.textContent = text;
                chatBody.appendChild(userMsg);
                chatInput.value = '';
                
                chatBody.scrollTop = chatBody.scrollHeight;

                // Add AI mock response
                setTimeout(() => {
                    const aiMsgContainer = document.createElement('div');
                    aiMsgContainer.className = 'message ai typing';
                    aiMsgContainer.innerHTML = '<span></span><span></span><span></span>';
                    chatBody.appendChild(aiMsgContainer);
                    chatBody.scrollTop = chatBody.scrollHeight;

                    setTimeout(() => {
                        aiMsgContainer.className = 'message ai';
                        aiMsgContainer.innerHTML = ''; // clear typing indicator
                        aiMsgContainer.textContent = "I'm a frontend-only mock AI. I can't process backend requests right now, but your interface looks great! Let me know if you need to adjust anything.";
                        chatBody.scrollTop = chatBody.scrollHeight;
                    }, 1500);
                }, 400);
            };

            sendChat.addEventListener('click', sendMessage);
            chatInput.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') sendMessage();
            });
        });
    </script>

    <!-- application logic as ES module -->
    <script type="module" src="js/app.js"></script>
</body>
</html>
